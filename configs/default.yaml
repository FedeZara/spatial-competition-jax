# Default MAPPO hyperparameters for spatial competition

# Training
num_envs: 64
rollout_length: 128
total_updates: 50000
seed: 42

# PPO
gamma: 0.99
gae_lambda: 0.95
ppo_epochs: 6
num_minibatches: 4
clip_epsilon: 0.2
value_coef: 0.50

# Entropy coefficient decay (entropy_coef is the fallback when annealing is off)
entropy_coef: 0.01
entropy_coef_start: 0.01
entropy_coef_end: 0.001
entropy_coef_anneal_frac: 0.8

# Optimization
learning_rate: 0.0003
max_grad_norm: 0.5

# Network architecture
hidden_dims: [256, 256]

# Logging
log_interval: 100
eval_interval: 500
save_interval: 2000
use_tensorboard: true
log_dir: "results"

# Evaluation
eval_episodes: 10
deterministic_eval: true

# No buyer choice temperature — hard argmax, fixed env
buyer_choice_temperature: null
buyer_choice_temp_start: null
