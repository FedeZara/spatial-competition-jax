# 1D Hotelling with discrete actions (11 location bins × 11 price bins)
# Quadratic transport costs (d'Aspremont et al., 1979)

# Environment
dimensions: 1
num_sellers: 2
max_price: 10.0
include_quality: false
movement_cost: 0.0
transport_cost: 10.0
transportation_cost_norm: 2.0
transport_cost_exponent: 2.0
new_buyers_per_step: 110
max_env_steps: 100
space_resolution: 10
max_step_size: 1.0

# Discrete action space
action_type: discrete
num_location_bins: 11
num_price_bins: 11
observation_mode: egocentric
independent: true
target_kl: 0.1

# No buyer choice temperature — hard argmax
buyer_choice_temperature: null
buyer_choice_temp_start: null

# Include parent defaults for training hypers
_parent: default.yaml

# ── Training overrides ──────────────────────────────────
# Larger network to learn conditional (ego-dependent) strategies
hidden_dims: [128, 128]

# Much more training — differentiation emerges late
total_updates: 200000

# Keep exploration alive: higher entropy floor
entropy_coef: 0.02
entropy_coef_start: 0.02
entropy_coef_end: 0.005
entropy_coef_anneal_frac: 0.9

# More parallel envs for diverse starting positions
num_envs: 128
