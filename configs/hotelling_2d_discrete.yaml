# 2D Hotelling with Conv2D observations + 3-way factored discrete actions
#
# Actions: loc_x(11) × loc_y(11) × price(11) = 3 independent categoricals
# Reachable positions: 0, 10, 20, ..., 100 on a 100-resolution grid
#
# Conv2D(32,k=5,s=2) → Conv2D(64,k=3,s=2) → Conv2D(128,k=3,s=2)
#   → GlobalAvgPool → Concat(scalars) → MLP(256,256) → 3 Categorical Heads

_parent: default.yaml

# ── Environment ────────────────────────────────────────────
dimensions: 2
num_sellers: 2
space_resolution: 20
max_price: 10.0
include_quality: false
movement_cost: 0.0
transport_cost: 10.0
transportation_cost_norm: 2.0
new_buyers_per_step: 500
despawn_no_purchase: true
max_env_steps: 200
max_step_size: 1.0

# Discrete action space (3-way factored)
action_type: discrete
num_location_bins: 11
num_price_bins: 11

# No buyer choice temperature — hard argmax
buyer_choice_temperature: null
buyer_choice_temp_start: null

# ── Observation ────────────────────────────────────────────
obs_type: conv_bin
observation_mode: egocentric
independent: true
independent_heads: true
target_kl: 0.02

# ── Network ────────────────────────────────────────────────
hidden_dims: [256, 256]

# ── Training ───────────────────────────────────────────────
total_updates: 500000
save_interval: 10000
num_envs: 64
rollout_length: 128
gamma: 0.995
deterministic_eval: false

# Entropy
entropy_coef: 0.01
entropy_coef_start: 0.01
entropy_coef_end: 0.002
entropy_coef_anneal_frac: 0.9

# PPO
learning_rate: 0.0003
num_minibatches: 4
ppo_epochs: 4
