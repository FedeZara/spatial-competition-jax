# PSRO configuration for 1D Hotelling (Linear City)
# Inherits environment settings from hotelling_1d_discrete.yaml

_parent: hotelling_1d_discrete.yaml

# Use egocentric observations for symmetric PSRO
observation_mode: egocentric

# PSRO outer loop
num_psro_iterations: 500
num_br_updates: 50000
num_eval_episodes: 32
num_initial_policies: 1
warmstart_br: false
br_mix_alpha_start: 0.5
br_mix_alpha_end: 0.1
br_mix_alpha_anneal_frac: 0.7
br_patience: 50
br_early_stop_delta: 0.05
log_interval: 100
save_interval: 25

# Override training hypers for best-response oracle
total_updates: 50000
num_envs: 256
rollout_length: 128

# ── Entropy fix for BR ──────────────────────────────────
# The parent config anneals entropy from 0.02→0.005 over 50K updates,
# but BR early-stops at ~2K updates → entropy barely anneals.
# Use much lower entropy for the BR:
#   - BR needs to converge to a sharp best-response, not explore
#   - 0.003 × ln(121) ≈ 0.014, comparable to policy-loss magnitude
entropy_coef: 0.003
entropy_coef_start: 0.005
entropy_coef_end: 0.001
entropy_coef_anneal_frac: 0.3
